; FlightArc Hardware Receiver Firmware
; Supports ESP32-S3, ESP32-C3, ESP8266

[platformio]
default_envs = esp32-s3

[common]
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0
    me-no-dev/ESPAsyncWebServer@^1.2.3
build_flags =
    -DBACKEND_URL=\"${sysenv.BACKEND_URL}\"
    -DAPI_KEY=\"${sysenv.API_KEY}\"
    -DWIFI_SSID=\"${sysenv.WIFI_SSID}\"
    -DWIFI_PASS=\"${sysenv.WIFI_PASS}\"
    -DWIFI_SSID_2=\"${sysenv.WIFI_SSID_2}\"
    -DWIFI_PASS_2=\"${sysenv.WIFI_PASS_2}\"
    -DWIFI_SSID_3=\"${sysenv.WIFI_SSID_3}\"
    -DWIFI_PASS_3=\"${sysenv.WIFI_PASS_3}\"
    -DNODE_NAME=\"${sysenv.NODE_NAME}\"
    -DFIRMWARE_VERSION=\"1.0.0\"

; ─── ESP32-S3: Full features (BLE + WiFi ODID, HTTPS) ───────

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
    h2zero/NimBLE-Arduino@^1.4.0
build_flags =
    ${common.build_flags}
    -DHAS_BLE=1
    -DHAS_TLS=1
    -DHARDWARE_TYPE=\"esp32-s3\"
board_build.partitions = default.csv

; ─── ESP32-C3: Full features (BLE + WiFi ODID, HTTPS) ───────

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
    h2zero/NimBLE-Arduino@^1.4.0
build_flags =
    ${common.build_flags}
    -DHAS_BLE=1
    -DHAS_TLS=1
    -DHARDWARE_TYPE=\"esp32-c3\"
board_build.partitions = default.csv

; ─── ESP8266: Light variant (WiFi Beacon only, no BLE, no TLS) ───

[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
    ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -DHAS_BLE=0
    -DHAS_TLS=0
    -DHARDWARE_TYPE=\"esp8266\"
