; FlightArc Hardware Receiver Firmware
; Supports ESP32-S3, ESP32-C3, ESP8266

[platformio]
default_envs = esp32-s3

[common]
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0
    me-no-dev/ESPAsyncWebServer@^1.2.3
; String defines (BACKEND_URL, API_KEY, WIFI_SSID/PASS, NODE_NAME, FIRMWARE_VERSION)
; are injected via inject_build_flags.py to handle spaces in values correctly.
extra_scripts = pre:inject_build_flags.py
build_flags =
    -std=gnu++17

; ─── ESP32-S3: Full features (BLE + WiFi ODID, HTTPS) ───────

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = ${common.monitor_speed}
extra_scripts = ${common.extra_scripts}
lib_deps =
    ${common.lib_deps}
    h2zero/NimBLE-Arduino@^1.4.0
build_flags =
    ${common.build_flags}
    -DHAS_BLE=1
    -DHAS_TLS=1
    -DHARDWARE_TYPE=\"esp32-s3\"
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.partitions = default_8MB.csv
board_build.flash_mode = dio

; ─── ESP32-C3: Full features (BLE + WiFi ODID, HTTPS) ───────

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = ${common.monitor_speed}
extra_scripts = ${common.extra_scripts}
lib_deps =
    ${common.lib_deps}
    h2zero/NimBLE-Arduino@^1.4.0
build_flags =
    ${common.build_flags}
    -DHAS_BLE=1
    -DHAS_TLS=1
    -DHARDWARE_TYPE=\"esp32-c3\"
board_build.partitions = default.csv

; ─── ESP32-S3 + GPS + RGB-Taster ("ESP32+GPS") ───
; Full ESP32-S3 feature set plus ATGM336H GPS (UART1 on GPIO17/18 @ 9600 baud)
; and RGB push-button (GPIO4 INPUT_PULLDOWN active-high, GPIO5/6/7 common-anode
; LEDs with LOW = LED on). Long-press on the button triggers deep sleep; wake
; is the same button going HIGH again.

[env:esp32-s3-gps]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = ${common.monitor_speed}
extra_scripts = ${common.extra_scripts}
lib_deps =
    ${common.lib_deps}
    h2zero/NimBLE-Arduino@^1.4.0
build_flags =
    ${common.build_flags}
    -DHAS_BLE=1
    -DHAS_TLS=1
    -DHAS_GPS=1
    -DHAS_RGB_BUTTON=1
    -DGPS_UART_RX=17
    -DGPS_UART_TX=18
    -DGPS_UART_BAUD=9600
    -DRGB_BTN_PIN=4
    -DRGB_LED_R_PIN=5
    -DRGB_LED_G_PIN=6
    -DRGB_LED_B_PIN=7
    -DHARDWARE_TYPE=\"esp32-s3-gps\"
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.partitions = default_8MB.csv
board_build.flash_mode = dio

; ─── ESP8266: Light variant (WiFi Beacon only, no BLE, no TLS) ───

[env:esp8266]
platform = espressif8266
board = nodemcuv2
framework = arduino
monitor_speed = ${common.monitor_speed}
extra_scripts = ${common.extra_scripts}
lib_deps =
    ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -DHAS_BLE=0
    -DHAS_TLS=0
    -DHARDWARE_TYPE=\"esp8266\"
